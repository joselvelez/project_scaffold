<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470" width="680">
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .box { fill: #F9FAFB; stroke: #D1D5DB; stroke-width: 0.5; }
    .title { font-size: 14px; font-weight: 500; fill: #111827; }
    .sub { font-size: 12px; fill: #6B7280; }
    .lbl { font-size: 11px; fill: #9CA3AF; }
    .arr { stroke: #D1D5DB; stroke-width: 1.5; fill: none; }
    .major-box { fill: #FEE2E2; stroke: #FCA5A5; stroke-width: 0.5; }
    .major-title { font-size: 14px; font-weight: 500; fill: #7F1D1D; }
    .major-sub { font-size: 12px; fill: #B91C1C; }
    .minor-box { fill: #DBEAFE; stroke: #93C5FD; stroke-width: 0.5; }
    .minor-title { font-size: 14px; font-weight: 500; fill: #1E3A8A; }
    .minor-sub { font-size: 12px; fill: #1D4ED8; }
    .patch-box { fill: #D1FAE5; stroke: #6EE7B7; stroke-width: 0.5; }
    .patch-title { font-size: 14px; font-weight: 500; fill: #064E3B; }
    .patch-sub { font-size: 12px; fill: #065F46; }
    .cmd { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 500; }
    .cmd-major { fill: #991B1B; }
    .cmd-minor { fill: #1D4ED8; }
    .cmd-patch { fill: #065F46; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Start -->
  <rect class="box" x="170" y="20" width="220" height="40" rx="8"/>
  <text class="title" x="280" y="40" text-anchor="middle" dominant-baseline="central">A change is ready to commit</text>

  <!-- Arrow: Start → Q1 -->
  <line x1="280" y1="60" x2="280" y2="88" class="arr" marker-end="url(#arr)"/>

  <!-- Q1 -->
  <rect class="box" x="110" y="90" width="340" height="60" rx="8"/>
  <text class="title" x="280" y="110" text-anchor="middle" dominant-baseline="central">Does this break anything existing?</text>
  <text class="sub" x="280" y="132" text-anchor="middle" dominant-baseline="central">Existing code or configs must change too</text>

  <!-- YES label + arrow: Q1 → MAJOR -->
  <text class="lbl" x="462" y="112" text-anchor="middle">Yes</text>
  <line x1="450" y1="120" x2="478" y2="120" class="arr" marker-end="url(#arr)"/>

  <!-- NO label + arrow: Q1 → Q2 -->
  <text class="lbl" x="290" y="172" text-anchor="start">No</text>
  <line x1="280" y1="150" x2="280" y2="188" class="arr" marker-end="url(#arr)"/>

  <!-- MAJOR -->
  <rect class="major-box" x="480" y="90" width="170" height="66" rx="8"/>
  <text class="major-title" x="565" y="108" text-anchor="middle" dominant-baseline="central">Major</text>
  <text class="major-sub" x="565" y="126" text-anchor="middle" dominant-baseline="central">e.g. 0.1.0 → 1.0.0</text>
  <text class="cmd cmd-major" x="565" y="146" text-anchor="middle" dominant-baseline="central">push:breaking</text>

  <!-- Q2 -->
  <rect class="box" x="110" y="190" width="340" height="60" rx="8"/>
  <text class="title" x="280" y="210" text-anchor="middle" dominant-baseline="central">Does this add something new?</text>
  <text class="sub" x="280" y="232" text-anchor="middle" dominant-baseline="central">New feature, command, file, or behavior</text>

  <!-- YES label + arrow: Q2 → MINOR -->
  <text class="lbl" x="462" y="212" text-anchor="middle">Yes</text>
  <line x1="450" y1="220" x2="478" y2="220" class="arr" marker-end="url(#arr)"/>

  <!-- NO label + arrow: Q2 → Q3 -->
  <text class="lbl" x="290" y="272" text-anchor="start">No</text>
  <line x1="280" y1="250" x2="280" y2="288" class="arr" marker-end="url(#arr)"/>

  <!-- MINOR -->
  <rect class="minor-box" x="480" y="190" width="170" height="66" rx="8"/>
  <text class="minor-title" x="565" y="208" text-anchor="middle" dominant-baseline="central">Minor</text>
  <text class="minor-sub" x="565" y="226" text-anchor="middle" dominant-baseline="central">e.g. 0.1.0 → 0.2.0</text>
  <text class="cmd cmd-minor" x="565" y="246" text-anchor="middle" dominant-baseline="central">push:new</text>

  <!-- Q3 -->
  <rect class="box" x="110" y="290" width="340" height="60" rx="8"/>
  <text class="title" x="280" y="310" text-anchor="middle" dominant-baseline="central">Does this fix or clean something up?</text>
  <text class="sub" x="280" y="332" text-anchor="middle" dominant-baseline="central">Bug fix, typo, refactor, or cleanup</text>

  <!-- YES label + arrow: Q3 → PATCH -->
  <text class="lbl" x="462" y="312" text-anchor="middle">Yes</text>
  <line x1="450" y1="320" x2="478" y2="320" class="arr" marker-end="url(#arr)"/>

  <!-- NO label + arrow: Q3 → Unclear -->
  <text class="lbl" x="290" y="372" text-anchor="start">No</text>
  <line x1="280" y1="350" x2="280" y2="388" class="arr" marker-end="url(#arr)"/>

  <!-- PATCH -->
  <rect class="patch-box" x="480" y="290" width="170" height="66" rx="8"/>
  <text class="patch-title" x="565" y="308" text-anchor="middle" dominant-baseline="central">Patch</text>
  <text class="patch-sub" x="565" y="326" text-anchor="middle" dominant-baseline="central">e.g. 0.1.0 → 0.1.1</text>
  <text class="cmd cmd-patch" x="565" y="346" text-anchor="middle" dominant-baseline="central">push:fix</text>

  <!-- Unclear fallback -->
  <rect class="box" x="110" y="390" width="340" height="44" rx="8"/>
  <text class="sub" x="280" y="412" text-anchor="middle" dominant-baseline="central">Describe the change — AI will classify it</text>

</svg>
